<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Sounds of Wind</title>
    <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    window.sb = createClient(
      'https://ldobqwmvazjgiznzkzig.supabase.co',   // ← your Project URL
      'sb_publishable_Aw1dpxzzKNIqQOyWNNqDxA_f3pcyFWQ'                    // ← your anon/public key
    );
    window.supabaseReady = true;
    window.dispatchEvent(new Event('supabaseReady'));
  </script> 

</head>
<body>

  <div class="gif-background">
    <img class="gif bottom-gif" src="waves/wave.gif" alt="wave">
    <img class="gif midbot-gif" src="waves/wave2.gif" alt="wave2">
    <img class="gif midtop-gif" src="waves/wave3.gif" alt="wave3">
    <img class="gif top-gif" src="waves/wave4.gif" alt="wave4">
  </div>

  <div class="gif-title">
    <img class="gif title" src="title.gif" alt="title">
  </div>

  <!-- Audio element -->
<audio id="bg-audio" src="waves/waves.mp3" loop playsinline></audio>

<!-- Mute button -->
<div class="audio-controls">
  <div class="mute-btn" onclick="toggleMute()">
    <img id="mute-icon" src="icons/mute3.png" alt="audio on" onerror="this.src='icons/mute3.png'">
  </div>
  <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1">
</div>

<!-- Add button -->
<div class="add-btn" onclick="handleAdd()">
  <img id="add-icon" src="icons/add.png" alt="add" onerror="this.src='icons/add.png'">
</div>

<!-- Info button -->
<div class="info-btn" onclick="toggleInfo()">
  <img src="icons/info.png" alt="info" onerror="this.src='icons/info.png'">
</div>

<!-- Library button -->
<div class="library-btn" onclick="openLibrary()">
  <img src="icons/library.png" alt="library" onerror="this.src='icons/library.png'">
</div>

<div class="scroll-hint">swipe to explore</div>

<div id="loader-overlay">
  <div id="loader-content">
    <div id="loader-gifs">
      <img src="boat/yellow_boat.gif" id="loader-boat">
      <img src="load.gif"             id="loader-spin">
    </div>
    <div id="loader-bar-track">
      <div id="loader-bar"></div>
    </div>
  </div>
</div>
<div id="loader-left"  class="loader-panel"></div>
<div id="loader-right" class="loader-panel"></div>

<script src="script.js"></script>

</body>
</html>
